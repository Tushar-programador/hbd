<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="A birthday experience built with love." />
  <meta name="theme-color" content="#FBF6F0" />
  <title>Happy Birthday, Varsha ❤️</title>

  <!-- Fonts (site still looks correct if these fail to load) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Manrope:wght@300;400;500;600;700&family=Caveat:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/sections.css" />
</head>
<body>
  <!-- Signature: the story thread (also the scroll-progress meter) -->
  <div id="story-thread" aria-hidden="true">
    <div class="thread-track"></div>
    <div class="thread-fill"></div>
    <span class="thread-node"></span>
    <span class="thread-node"></span>
    <span class="thread-node"></span>
    <span class="thread-node"></span>
    <span class="thread-node"></span>
    <span class="thread-node"></span>
  </div>

  <!-- Ambient floating hearts -->
  <div id="hearts-layer" aria-hidden="true"></div>

  <!-- Full-screen effects canvas (confetti / fireworks) -->
  <canvas id="fx-canvas" aria-hidden="true"></canvas>

  <!-- Sound toggle -->
  <button id="mute-toggle" aria-pressed="true" aria-label="Mute" title="Sound off — tap to turn on">
    <svg class="icon-off" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M11 5 6 9H2v6h4l5 4V5z" />
      <line x1="23" y1="9" x2="17" y2="15" />
      <line x1="17" y1="9" x2="23" y2="15" />
    </svg>
    <svg class="icon-on" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M11 5 6 9H2v6h4l5 4V5z" />
      <path d="M15.5 8.5a5 5 0 0 1 0 7" />
      <path d="M18.5 5.5a9 9 0 0 1 0 13" />
    </svg>
  </button>

  <main>
    <!-- ============================ LANDING ============================ -->
    <section id="landing" class="section center">
      <div class="landing__bg animate-gradient" aria-hidden="true"></div>
      <div class="section__inner center">
        <p class="eyebrow reveal" data-reveal>For the one I love</p>
        <h1 class="landing__title reveal" data-reveal>
          <span class="landing__hb" id="landing-title">Happy Birthday</span>
          <span class="landing__name" id="landing-name">Varsha</span>
        </h1>
        <p class="lede landing__message reveal" data-reveal id="landing-message"></p>
        <button class="btn pulse reveal" data-reveal id="begin-journey"></button>
        <div class="scroll-cue reveal" data-reveal aria-hidden="true">
          <span></span>
        </div>
      </div>
    </section>

    <!-- ======================= CH.1 HAPPY BIRTHDAY ==================== -->
    <section id="chapter-birthday" class="section center">
      <div class="section__inner center">
        <p class="eyebrow reveal" data-reveal id="birthday-eyebrow"></p>
        <h2 class="chapter-title reveal" data-reveal id="birthday-title"></h2>
        <p class="lede reveal" data-reveal id="birthday-subtitle"></p>

        <div class="cake-stage reveal reveal--scale" data-reveal>
          <div class="balloons" aria-hidden="true">
            <span class="balloon b1"></span>
            <span class="balloon b2"></span>
            <span class="balloon b3"></span>
            <span class="balloon b4"></span>
            <span class="balloon b5"></span>
          </div>
          <div id="cake" role="button" tabindex="0" aria-label="Tap to blow out the candle">
            <div class="cake__glow" aria-hidden="true"></div>
            <div class="cake__candle">
              <span class="cake__flame" aria-hidden="true"></span>
              <span class="cake__wick" aria-hidden="true"></span>
            </div>
            <div class="cake__tier cake__tier--top"></div>
            <div class="cake__tier cake__tier--mid"></div>
            <div class="cake__tier cake__tier--base"></div>
            <div class="cake__plate" aria-hidden="true"></div>
          </div>
        </div>

        <p class="hint reveal" data-reveal id="birthday-hint"></p>
        <a class="btn btn--ghost reveal" data-reveal href="#chapter-beginning" id="birthday-cta"></a>
      </div>
    </section>

    <!-- ======================= CH.2 THE BEGINNING ==================== -->
    <section id="chapter-beginning" class="section">
      <div class="section__inner">
        <header class="chapter-head reveal" data-reveal>
          <p class="eyebrow" id="beginning-eyebrow"></p>
          <h2 class="chapter-title" id="beginning-title"></h2>
          <p class="lede" id="beginning-intro"></p>
        </header>
        <div class="timeline" id="beginning-timeline">
          <div class="timeline__spine" aria-hidden="true"></div>
        </div>
      </div>
    </section>

    <!-- ========================== CH.3 MUSIC ========================= -->
    <section id="chapter-music" class="section">
      <div class="section__inner">
        <header class="chapter-head reveal" data-reveal>
          <p class="eyebrow" id="music-eyebrow"></p>
          <h2 class="chapter-title" id="music-title"></h2>
          <p class="lede" id="music-intro"></p>
        </header>
        <ul class="playlist" id="playlist"></ul>
      </div>
    </section>

    <!-- ======================= CH.4 LOVE LETTER ===================== -->
    <section id="chapter-letter" class="section center">
      <div class="section__inner center">
        <p class="eyebrow reveal" data-reveal id="letter-eyebrow"></p>
        <h2 class="chapter-title reveal" data-reveal id="letter-title"></h2>

        <div class="letter-stage">
          <div id="envelope" role="button" tabindex="0" aria-label="Open the letter">
            <div class="envelope__back" aria-hidden="true"></div>
            <div class="envelope__paper" aria-hidden="true"></div>
            <div class="envelope__front" aria-hidden="true"></div>
            <div class="envelope__flap" aria-hidden="true"></div>
            <div class="envelope__seal" aria-hidden="true">
              <span>V</span>
            </div>
          </div>

          <article class="letter-paper" id="letter-paper" aria-hidden="true">
            <p class="letter__body" id="letter-body"></p>
            <p class="letter__signoff" id="letter-signoff"></p>
            <p class="letter__signature" id="letter-signature"></p>
          </article>
        </div>

        <p class="hint reveal" data-reveal id="letter-hint"></p>
      </div>
    </section>

    <!-- ====================== CH.5 FINAL SURPRISE ==================== -->
    <section id="chapter-final" class="section center">
      <div class="final__dim" aria-hidden="true"></div>
      <div class="section__inner center">
        <div class="final-intro reveal" data-reveal id="final-intro">
          <p class="eyebrow" id="final-eyebrow"></p>
          <p class="lede final__lede" id="final-lede"></p>
          <p class="final__prompt" id="final-prompt"></p>
          <button class="btn pulse" id="final-gift-btn"></button>
        </div>

        <div class="final-stage" id="final-stage" aria-hidden="true">
          <div class="slideshow" id="slideshow"></div>
          <div class="final-message" id="final-message"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- ===================== Persistent mini music player ==================== -->
  <div id="mini-player" class="glass" aria-label="Music player" data-collapsed="true">
    <button class="mp__btn mp__toggle" id="mp-collapse" aria-label="Show music player">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9 18V5l12-2v13" /><circle cx="6" cy="18" r="3" /><circle cx="18" cy="16" r="3" />
      </svg>
    </button>
    <div class="mp__meta">
      <span class="mp__title" id="mp-title">—</span>
      <span class="mp__note" id="mp-note"></span>
    </div>
    <div class="mp__controls">
      <button class="mp__btn" id="mp-prev" aria-label="Previous song">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="mp__btn mp__play" id="mp-play" aria-label="Play">
        <svg class="ic-play" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
        <svg class="ic-pause" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="display:none"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
      </button>
      <button class="mp__btn" id="mp-next" aria-label="Next song">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
      </button>
    </div>
    <label class="mp__vol">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg>
      <input type="range" id="mp-volume" min="0" max="100" value="70" aria-label="Volume" />
    </label>
  </div>

  <!-- ============================ Scripts ============================ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

  <script src="content.js"></script>
  <script src="js/sections/celebration.js"></script>
  <script src="js/sections/love-letter.js"></script>
  <script src="js/sections/music-player.js"></script>
  <script src="js/sections/final-surprise.js"></script>
  <script src="js/sparkle.js"></script>
  <script src="js/easter-eggs.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
